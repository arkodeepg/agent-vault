<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Agent Vault API broker flow</title>
  <desc id="desc">Agent sends request intent to Agent Vault. Agent Vault validates the host, injects auth internally, calls the external API, then returns only the API response.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <style>
      .bg{fill:#0f172a}
      .card{fill:#111827;stroke:#334155;stroke-width:2}
      .decision{fill:#172554;stroke:#3b82f6;stroke-width:2}
      .ok{fill:#052e16;stroke:#22c55e;stroke-width:2}
      .blocked{fill:#3f1d1d;stroke:#ef4444;stroke-width:2}
      .text{font:600 22px system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc}
      .small{font:500 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}
      .label{font:600 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#93c5fd}
      .line{stroke:#6b7280;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1120" height="360" rx="20"/>

  <rect class="card" x="40" y="110" width="180" height="100" rx="12"/>
  <text class="text" x="130" y="151" text-anchor="middle">Agent</text>
  <text class="small" x="130" y="180" text-anchor="middle">script or tool</text>

  <rect class="card" x="300" y="95" width="210" height="130" rx="12"/>
  <text class="text" x="405" y="145" text-anchor="middle">Agent Vault</text>
  <text class="small" x="405" y="174" text-anchor="middle">validates profile</text>
  <text class="small" x="405" y="198" text-anchor="middle">keeps key inside</text>

  <path class="decision" d="M 635 80 L 780 160 L 635 240 L 490 160 Z"/>
  <text class="text" x="635" y="153" text-anchor="middle">Host</text>
  <text class="text" x="635" y="181" text-anchor="middle">approved?</text>

  <rect class="ok" x="840" y="95" width="200" height="130" rx="12"/>
  <text class="text" x="940" y="145" text-anchor="middle">External API</text>
  <text class="small" x="940" y="174" text-anchor="middle">authenticated</text>
  <text class="small" x="940" y="198" text-anchor="middle">request</text>

  <rect class="blocked" x="520" y="275" width="250" height="52" rx="10"/>
  <text class="small" x="645" y="307" text-anchor="middle">create pending domain request</text>

  <path class="line" d="M 220 160 L 300 160"/>
  <text class="label" x="260" y="140" text-anchor="middle">request intent</text>

  <path class="line" d="M 510 160 L 488 160"/>
  <path class="line" d="M 780 160 L 840 160"/>
  <text class="label" x="810" y="140" text-anchor="middle">yes</text>

  <path class="line" d="M 635 240 L 635 275"/>
  <text class="label" x="665" y="264">no</text>

  <path class="line" d="M 840 205 C 725 315 420 315 300 205"/>
  <text class="label" x="570" y="336" text-anchor="middle">response only, no raw key</text>
</svg>
