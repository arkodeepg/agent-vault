<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard pending domain approval</title>
  <desc id="desc">The API Profiles tab shows pending hosts. The user reviews profile and sample URL, then approves or rejects the request.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <style>
      .bg{fill:#0f172a}
      .panel{fill:#111827;stroke:#334155;stroke-width:2}
      .tab{fill:#312e81;stroke:#818cf8;stroke-width:2}
      .approve{fill:#052e16;stroke:#22c55e;stroke-width:2}
      .reject{fill:#3f1d1d;stroke:#f97316;stroke-width:2}
      .text{font:600 21px system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc}
      .small{font:500 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}
      .line{stroke:#6b7280;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="980" height="330" rx="20"/>

  <rect class="panel" x="40" y="55" width="250" height="205" rx="14"/>
  <text class="text" x="165" y="97" text-anchor="middle">Dashboard</text>
  <rect class="tab" x="75" y="125" width="180" height="48" rx="8"/>
  <text class="small" x="165" y="155" text-anchor="middle">API Profiles tab</text>
  <text class="small" x="165" y="209" text-anchor="middle">pending hosts list</text>

  <rect class="panel" x="375" y="80" width="245" height="150" rx="14"/>
  <text class="text" x="498" y="127" text-anchor="middle">Review</text>
  <text class="small" x="498" y="160" text-anchor="middle">profile and sample URL</text>
  <text class="small" x="498" y="188" text-anchor="middle">confirm host is valid</text>

  <rect class="approve" x="725" y="60" width="200" height="78" rx="12"/>
  <text class="text" x="825" y="106" text-anchor="middle">Approve</text>
  <text class="small" x="825" y="128" text-anchor="middle">allow future calls</text>

  <rect class="reject" x="725" y="190" width="200" height="78" rx="12"/>
  <text class="text" x="825" y="236" text-anchor="middle">Reject</text>
  <text class="small" x="825" y="258" text-anchor="middle">keep blocked</text>

  <path class="line" d="M 290 155 L 375 155"/>
  <path class="line" d="M 620 140 L 725 104"/>
  <path class="line" d="M 620 170 L 725 224"/>
</svg>
